<div class="welcome-wrapper" (click)="toggleColor()">

  <div class="bg-layer" [class.colored]="isColored">
    <video #bgVideo autoplay loop muted playsinline class="video-background">
    <source src="/assets/videos/ptvid.mp4" type="video/mp4">
  </video>
    <div class="gradient-overlay"></div>
  </div>

  <section class="welcome-container flex justify-center items-center h-screen">
    <div class="heading text-center">
      <h1 class="font-bold text-8xl text-[#D5A822] tracking-[-9%]">Pinatubo</h1>
      <h2 class="font-semibold text-3xl text-white text-end">Museum</h2>
    </div>
  </section>

</div>
